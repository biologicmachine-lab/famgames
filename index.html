<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamPG Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --shell: #d6d1c4;
            --shell-shadow: #a8a18f;
            --shell-dark: #6b665a;
            --screen-frame: #2f2f34;
            --screen-bg: #9bbc0f;
            --screen-dark: #0f380f;
            --screen-mid: #306230;
            --screen-light: #8bac0f;
            --accent-a: #7b1e3a;
            --accent-b: #40203c;
            --btn-dark: #2a2a2a;
            --btn-light: #4b4b4b;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background:
                radial-gradient(circle at top, #444 0%, #1b1b1f 45%, #090909 100%);
            font-family: 'Press Start 2P', monospace;
            color: var(--screen-dark);
        }

        .gameboy {
            width: min(100%, 420px);
            background: linear-gradient(145deg, var(--shell), #c5c0b3);
            border: 3px solid var(--shell-dark);
            border-radius: 28px 28px 80px 28px;
            box-shadow:
                0 18px 40px rgba(0, 0, 0, 0.45),
                inset -6px -6px 0 var(--shell-shadow),
                inset 6px 6px 0 rgba(255, 255, 255, 0.35);
            padding: clamp(16px, 4vw, 22px);
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
            font-size: clamp(8px, 2vw, 10px);
            color: #4f4b44;
        }

        .brand {
            letter-spacing: 1px;
        }

        .power-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d64545;
            box-shadow: 0 0 10px rgba(214, 69, 69, 0.8);
            flex-shrink: 0;
        }

        .screen-shell {
            background: var(--screen-frame);
            border-radius: 18px 18px 48px 18px;
            padding: clamp(14px, 4vw, 18px);
            box-shadow: inset 0 0 0 3px #4d4d54;
        }

        .screen-label {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
            color: #c9cad3;
            font-size: clamp(7px, 1.8vw, 8px);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .screen {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            background:
                linear-gradient(rgba(255,255,255,0.08), rgba(255,255,255,0)),
                var(--screen-bg);
            min-height: clamp(260px, 62vw, 330px);
            border: 3px solid #1f1f1f;
            padding: clamp(18px, 5vw, 24px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .screen::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                rgba(15, 56, 15, 0.02) 0,
                rgba(15, 56, 15, 0.02) 2px,
                rgba(15, 56, 15, 0.08) 3px,
                rgba(15, 56, 15, 0.08) 4px
            );
            opacity: 0.45;
        }

        .screen-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 20px;
        }

        .title {
            text-align: center;
            line-height: 1.6;
        }

        .title h1 {
            margin: 0 0 10px;
            font-size: clamp(18px, 4.6vw, 24px);
            color: var(--screen-dark);
        }

        .title p {
            margin: 0;
            font-size: clamp(8px, 2.2vw, 10px);
            color: var(--screen-mid);
            line-height: 1.8;
        }

        .menu {
            display: grid;
            gap: 14px;
            margin-top: auto;
        }

        .game-link {
            text-decoration: none;
            color: inherit;
        }

        .game-button {
            width: 100%;
            border: 3px solid var(--screen-dark);
            background: rgba(255, 255, 255, 0.14);
            color: var(--screen-dark);
            border-radius: 10px;
            padding: 16px 14px;
            text-align: left;
            font: inherit;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
            box-shadow: 0 4px 0 rgba(15, 56, 15, 0.55);
        }

        .game-button:hover,
        .game-button:focus-visible {
            background: rgba(255, 255, 255, 0.24);
            transform: translateY(-1px);
            outline: none;
        }

        .game-button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 rgba(15, 56, 15, 0.55);
        }

        .game-name {
            display: block;
            font-size: clamp(12px, 3vw, 14px);
            margin-bottom: 8px;
        }

        .game-desc {
            display: block;
            font-size: clamp(7px, 1.8vw, 8px);
            line-height: 1.7;
            color: var(--screen-mid);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            margin-top: 18px;
        }

        .dpad {
            display: grid;
            grid-template-columns: 44px 44px 44px;
            grid-template-rows: 44px 44px 44px;
            gap: 4px;
        }

        .dpad-btn,
        .action-btn {
            border: none;
            background: linear-gradient(145deg, var(--btn-light), var(--btn-dark));
            color: #f0f0f0;
            font: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 1px 1px 0 rgba(255,255,255,0.12), 0 4px 10px rgba(0,0,0,0.3);
            user-select: none;
        }

        .dpad-btn {
            border-radius: 8px;
            font-size: 14px;
        }

        .dpad-btn.up { grid-column: 2; grid-row: 1; }
        .dpad-btn.left { grid-column: 1; grid-row: 2; }
        .dpad-btn.center { grid-column: 2; grid-row: 2; background: #222; }
        .dpad-btn.right { grid-column: 3; grid-row: 2; }
        .dpad-btn.down { grid-column: 2; grid-row: 3; }

        .actions {
            display: flex;
            gap: 12px;
            padding-right: 8px;
        }

        .action-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--accent-a), var(--accent-b));
            font-size: 11px;
            transform: rotate(-20deg);
        }

        .footer-text {
            margin-top: 12px;
            text-align: center;
            font-size: clamp(7px, 1.8vw, 8px);
            color: #5d584f;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            .controls {
                gap: 10px;
            }

            .dpad {
                grid-template-columns: 36px 36px 36px;
                grid-template-rows: 36px 36px 36px;
            }

            .action-btn {
                width: 46px;
                height: 46px;
                font-size: 10px;
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 10px;
            }

            .screen {
                min-height: 240px;
                padding: 16px;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            .actions {
                padding-right: 0;
            }
        }
    </style>
</head>
<body>
    <main class="gameboy" aria-label="FamPG game menu">
        <div class="top-bar">
            <span class="brand">DOT MATRIX WITH STEREO SOUND</span>
            <span class="power-dot" aria-hidden="true"></span>
        </div>

        <section class="screen-shell">
            <div class="screen-label">Nintendo-style game menu</div>
            <div class="screen">
                <div class="screen-content">
                    <div class="title">
                        <h1>FAMPG</h1>
                        <p>Select a game below.<br>Works across mobile, tablet, and desktop.</p>
                    </div>

                    <nav class="menu" aria-label="Game list">
                        <a class="game-link" href="snake/index.html">
                            <button class="game-button" type="button">
                                <span class="game-name">▶ SNAKE</span>
                                <span class="game-desc">Classic arcade movement and touch-friendly controls.</span>
                            </button>
                        </a>

                        <a class="game-link" href="bounce/index.html">
                            <button class="game-button" type="button">
                                <span class="game-name">▶ BOUNCE</span>
                                <span class="game-desc">Jump, dodge spikes, and collect hoops through the levels.</span>
                            </button>
                        </a>
                    </nav>
                </div>
            </div>
        </section>

        <section class="controls" aria-hidden="true">
            <div class="dpad">
                <div class="dpad-btn up">▲</div>
                <div class="dpad-btn left">◀</div>
                <div class="dpad-btn center">●</div>
                <div class="dpad-btn right">▶</div>
                <div class="dpad-btn down">▼</div>
            </div>

            <div class="actions">
                <div class="action-btn">B</div>
                <div class="action-btn">A</div>
            </div>
        </section>

        <div class="footer-text">Use the on-screen menu to launch Snake or Bounce.</div>
    </main>
</body>
</html>
